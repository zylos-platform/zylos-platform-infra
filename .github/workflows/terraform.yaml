name: Terraform CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~> 1.10
          terraform_wrapper: false

      - name: Verify formatting
        run: terraform fmt -check -recursive terraform/

  validate:
    name: terraform validate (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [bootstrap, dev, prod]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~> 1.10
          terraform_wrapper: false

      - name: Init (no backend)
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform init -backend=false -input=false

      - name: Validate
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform validate -no-color

  validate-modules:
    name: terraform validate (modules/${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - network
          - eks-cluster
          - msk
          - aurora-postgres
          - elasticache-redis
          - opensearch
          - s3-tfstate
          - observability-stack
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~> 1.10
          terraform_wrapper: false

      - name: Skip empty module
        id: check
        working-directory: terraform/modules/${{ matrix.module }}
        run: |
          if [[ ! -f main.tf ]]; then
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            echo "Module skeleton has no main.tf yet — skipping validate."
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Init (no backend)
        if: steps.check.outputs.skip == 'false'
        working-directory: terraform/modules/${{ matrix.module }}
        run: terraform init -backend=false -input=false

      - name: Validate
        if: steps.check.outputs.skip == 'false'
        working-directory: terraform/modules/${{ matrix.module }}
        run: terraform validate -no-color

  tflint:
    name: tflint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      - run: tflint --recursive --format compact

  tfsec:
    name: tfsec (security scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform/
          soft_fail: true   # advisory; doesn't block PRs yet

  conventional-commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json
