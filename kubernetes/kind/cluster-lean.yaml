###############################################################################
# Zylos Local Kubernetes Cluster (kind) — LEAN single-node configuration.
#
# Use this when memory is constrained. Single node, no node-distribution
# scheduling realism, but lighter on RAM.
###############################################################################
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: zylos

networking:
  apiServerAddress: 127.0.0.1
  apiServerPort: 6443

nodes:
  - role: control-plane
    image: kindest/node:v1.32.8@sha256:abd489f042d2b644e2d033f5c2d900bc707798d075e8186cb65e3f1367a9d5a1
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
