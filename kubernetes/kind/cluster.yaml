###############################################################################
#
# Zylos Local Kubernetes Cluster (kind).
#
# A 3-node cluster (1 control plane + 2 workers) running Kubernetes 1.32 to
# match what we'll provision on AWS EKS in production.
#
# Why 3 nodes locally?
#   - Realistic scheduling behavior (Pod anti-affinity, topology spread, etc.).
#   - Mirrors a small EKS cluster.
#   - Argo CD reconciles workloads across nodes the same way prod does.
#
# Port mappings:
#   - 80/443 → NGINX ingress controller (gateway to all services)
#   - 30000-30100 → reserved range for NodePort exposures during dev
#
# kindest/node digest pinned for reproducibility (per kind project guidance).
#
###############################################################################
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: zylos

# Cluster-wide configuration
networking:
  apiServerAddress: 127.0.0.1
  apiServerPort: 6443
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/16"
  # Use kindnetd (default CNI). Istio's CNI is a different layer that runs ON TOP.
  disableDefaultCNI: false
  # nftables mode is supported in K8s 1.31+; we use the default iptables mode for
  # widest tool compatibility with Istio CNI.
  kubeProxyMode: "iptables"

# Feature gates 
featureGates: {}

nodes:
  # Control plane node — also handles ingress traffic via port mappings.
  - role: control-plane
    image: kindest/node:v1.32.8@sha256:abd489f042d2b644e2d033f5c2d900bc707798d075e8186cb65e3f1367a9d5a1
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # HTTP for the NGINX ingress controller — this is how the host reaches
      # workloads inside the cluster (Argo CD UI, Grafana, Keycloak, etc.).
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP

  # Worker nodes — application workloads land here.
  - role: worker
    image: kindest/node:v1.32.8@sha256:abd489f042d2b644e2d033f5c2d900bc707798d075e8186cb65e3f1367a9d5a1
    labels:
      zylos.app/node-role: workload

  - role: worker
    image: kindest/node:v1.32.8@sha256:abd489f042d2b644e2d033f5c2d900bc707798d075e8186cb65e3f1367a9d5a1
    labels:
      zylos.app/node-role: workload
